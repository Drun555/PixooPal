services:
  pixoopal:
    image: drun555/pixoopal:latest
    container_name: pixoopal
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      # PIXOO_DEVICE_ADDRESS: 192.168.6.3
      PIXOOPAL_INSTANCE_NAME: PixooPal
      HOME_ASSISTANT_URL: http://192.168.5.10:8123
      HOME_ASSISTANT_TOKEN: "xxx"
      HTTP_PORT: "5173"
      # HTTPS_PORT: "443"
      PIXOOPAL_HOST_IP: 192.168.6.10
      RESOLUTION: "64"
      # DEBUG_LOGGING: false
    volumes:
      - ./pixoopal-data:/data
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
